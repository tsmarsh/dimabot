AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Slack Filth Enforcer Bot — rewrites clean messages with creative profanity
  in channels that demand it.

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.12

Parameters:
  SecretName:
    Type: String
    Default: slack-filth-bot/secrets
    Description: Name of the Secrets Manager secret containing SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET, ANTHROPIC_API_KEY

Resources:

  FilthEnforcerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: slack-filth-enforcer
      Handler: handler.lambda_handler
      CodeUri: .
      Environment:
        Variables:
          SECRET_NAME: !Ref SecretName
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}*"
      FunctionUrlConfig:
        AuthType: NONE  # Slack verifies via signing secret
        Cors:
          AllowOrigins:
            - "*"

Outputs:
  FunctionUrl:
    Description: Lambda Function URL — use this as your Slack Event Subscriptions Request URL
    Value: !GetAtt FilthEnforcerFunctionUrl.FunctionUrl

  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt FilthEnforcerFunction.Arn
